upstream backend {
  server backend:8000;
}

upstream frontend {
  server frontend:3000;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=luxe_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=luxe_login:10m rate=5r/s;

# Cache zone for static
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=luxe_cache:10m max_size=1g inactive=24h;

server {
  listen 80;
  server_name luxeperfume.in www.luxeperfume.in api.luxeperfume.in;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Static files
  location /static/ {
    alias /var/www/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /media/ {
    alias /var/www/media/;
    expires 30d;
    add_header Cache-Control "public";
  }

  # API
  location /api/ {
    limit_req zone=luxe_api burst=60 nodelay;
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Auth endpoints — stricter rate limit
  location ~ ^/api/auth/login {
    limit_req zone=luxe_login burst=10 nodelay;
    proxy_pass http://backend;
  }

  # Static & media served by backend via /static/ /media/
  location /admin/ {
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Frontend (Next.js) for everything else
  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
